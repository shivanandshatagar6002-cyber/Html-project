<!DOCTYPE html>
<html>
<head>
<title>Job Application Form</title>
</head>
<body>
<h2>Job Application Form</h2>
<form>
<Label>Name</Label>
<input type="text" name="Full Name" id="name" placeholder="Enter your Name" required><br><br>
<Label>Email-id</Label>
<input type="Email" name="Email" placeholder="Enter your Email-id" required><br><br>
<Label>Phone Number</Label>
<input type="tel" name="Phone Number" placeholder="Enter your Phone Number" required><br><br>
<Label>Date Of Birth:</Label>
<input type="date" name="Dob" required><br><br>
<Label>Address:</Label>
<textarea rows="2" cols="30"></textarea><br><br>
<Label>Gender:</Label><br>
Male<input type="radio" name="Male"><br>
Female<input type="radio" name="Female"><br><br>
<Label>Country:</Label>
<select name="Country">Country
<option value="India">India</option>
<option value="USA">USA</option>
<option value="UK">UK</option>
<option value="Japan">Japan</option>
</select><br><br>
<Label>Highest Qualification</Label>
<select>
<option value="SSLC">SSLC</option>
<option value="PUC">PUC</option>
<option value="BCA">BCA</option>
</option value="B.Tech">B.Tech</option>
</select><br><br>
<Label>Job Role</Label>
<input type="text" name="Job Role" placeholder="Enter your job role" required><br><br>
<Label>Skills</Label><br>
Java<input type="checkbox" name="Java"><br>
Python<input type="checkbox" name="Python"><br>
MYSQL<input  type="checkbox" name="MYSQL"><br>
JavaScript<input type="checkbox" name="JavaScript"><br><br>
<Label>Upload your resume:</Label>
<input type="file" name="Upload"><br><br>
<Label>Why Should we hire you</Label>
<textarea rows="2" cols="30" place></textarea><br><br>
<input type="submit" name="Submit" value="Submit">&nbsp;
<input type="reset" name="Reset" value="Reset">
</body>
</html>
